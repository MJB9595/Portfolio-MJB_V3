<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <style>
      /* 다크 모드 (기본) */
      .bg { fill: #08080e; }
      .text { fill: #f0c040; }
      .glow { filter: drop-shadow(0 0 3px #f0c04088); }

      /* 라이트 모드 */
      @media (prefers-color-scheme: light) {
        .bg { fill: #f5f4f0; }
        .text { fill: #b87800; }
        .glow { filter: drop-shadow(0 0 3px #b8780044); }
      }
    </style>
    <!-- 골드 그라데이션 (선택 사항) -->
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0c040" />
      <stop offset="100%" stop-color="#d4a020" />
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect class="bg" width="64" height="64" rx="12" />

  <!-- JA 모노그램 -->
  <text x="50%" y="50%" dominant-baseline="central" text-anchor="middle"
        font-family="'JetBrains Mono', 'Consolas', monospace"
        font-size="28" font-weight="bold"
        class="text glow">JA</text>
</svg>